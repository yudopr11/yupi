[build]
builder = "railpack"
buildCommand = "uv sync"

[deploy]
startCommand = "uv run alembic upgrade head && (uv run python scripts/update_embeddings.py || true) && uv run uvicorn app.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/"
healthcheckTimeout = 100
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[variables]
PYTHON_VERSION = "3.13"